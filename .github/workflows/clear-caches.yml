name: Clear Caches

on:
  workflow_dispatch:

jobs:
  clear-caches:
    runs-on: ubuntu-latest
    permissions:
      actions: write

    steps:
      - name: Delete all caches
        uses: actions/github-script@v8
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            let page = 1;
            while (true) {
              const { data: { actions_caches: caches } } = await github.rest.actions.getActionsCacheList({
                owner, repo, page, per_page: 100,
              });
              if (caches.length === 0) break;
              for (const cache of caches) {
                for (let attempt = 0; attempt < 3; attempt++) {
                  try {
                    await github.rest.actions.deleteActionsCacheById({ owner, repo, cache_id: cache.id });
                    core.info(`Deleted cache (${cache.id}): ${cache.key}`);
                    break;
                  } catch (e) {
                    if (attempt < 2) {
                      core.warning(`Retrying cache (${cache.id}): ${e.message}`);
                      await new Promise(r => setTimeout(r, 3000));
                    } else {
                      core.warning(`Failed to delete cache (${cache.id}): ${e.message}`);
                    }
                  }
                }
              }
              page++;
            }
